<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --green: #39ff14;
    --cyan: #00f5ff;
    --red: #ff2d55;
    --yellow: #ffd60a;
    --purple: #bf5af2;
    --text: #e0e0f0;
  }

  /* ── LIGHT THEME ── */
  body.light {
    --bg: #f4f4f0;
    --surface: #ffffff;
    --border: #dcdcd0;
    --green: #1a9e00;
    --cyan: #0070cc;
    --red: #d0002a;
    --yellow: #b07800;
    --purple: #7700cc;
    --text: #1a1a1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Share Tech Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    height: 100svh; /* shrinks to exclude browser chrome on Android Chrome */
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOPBAR ── */
  .stat-val { font-family:'Press Start 2P',monospace; font-size:9px; color:var(--cyan); text-shadow:0 0 6px var(--cyan); }

  #stat-remaining-btn {
    display:flex; flex-direction:column; align-items:center; gap:1px;
    cursor:pointer; flex-shrink:0;
    padding: 2px 6px; border-radius:2px; transition:background .15s;
  }
  #stat-remaining-btn:hover { background:rgba(0,245,255,.08); }

  #stat-popup {
    display:none; position:fixed;
    background:var(--surface); border:1px solid var(--cyan);
    border-radius:2px; padding:10px 14px; z-index:2000;
    min-width:150px; box-shadow:0 4px 20px rgba(0,245,255,.2);
    font-family:'Share Tech Mono',monospace;
  }
  #stat-popup.open { display:block; }
  .stat-popup-row {
    display:flex; justify-content:space-between; gap:16px;
    padding:3px 0; font-size:11px; color:#9090a0;
  }
  .stat-popup-row span:last-child {
    font-family:'Press Start 2P',monospace; font-size:7px; color:var(--text);
  }

  #data-popup {
    display:none; position:fixed;
    background:var(--surface); border:1px solid var(--border);
    border-radius:2px; z-index:2000; min-width:180px;
    box-shadow:0 4px 20px rgba(0,0,0,.3);
    font-family:'Share Tech Mono',monospace; overflow:hidden;
  }
  #data-popup input[type="text"] {
    width:100%; background:var(--bg); border:1px solid var(--border);
    color:var(--text); height:28px; padding:0 8px;
    font-family:'Share Tech Mono',monospace; font-size:11px;
    border-radius:2px; outline:none; box-sizing:border-box;
  }
  #data-popup input[type="text"]:focus { border-color:var(--cyan); }
  #data-popup.open { display:block; }
  .data-menu-item {
    padding:9px 14px; font-size:11px; cursor:pointer;
    color:var(--text); transition:background .15s;
  }
  .data-menu-item:hover { background:rgba(0,245,255,.08); color:var(--cyan); }
  .data-menu-danger { color:var(--red); }
  .data-menu-danger:hover { background:rgba(255,45,85,.08); color:var(--red); }

  .topbar-sep { width:1px; height:20px; background:var(--border); flex-shrink:0; }

  /* ── CONTROLS ── */
  .controls {
    background: var(--surface);
    border-bottom: 2px solid var(--green);
    padding: 6px 16px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }
  .controls::after {
    content:'';
    position:absolute;
    inset:0;
    background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,245,255,.015) 2px,rgba(0,245,255,.015) 4px);
    pointer-events:none;
  }

  /* Shared height/font for controls */
  .controls input,
  .filter-btn {
    height: 30px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 0 10px;
    border-radius: 2px;
    box-sizing: border-box;
    line-height: 28px;
  }

  .controls input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    outline: none;
    transition: border-color .2s;
  }
  .controls input:focus { border-color: var(--cyan); }

  .filter-btn {
    background: transparent; border: none; color: #888;
    cursor: pointer; transition: all .2s; font-size: 13px;
  }
  #btn-cycle { min-width: 80px; }
  .filter-btn.active { color:var(--cyan); }
  .filter-btn:hover { color:var(--text); }

  /* Circular icon buttons (theme toggle, gear) */
  #btn-theme, #data-menu-btn {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    width: 30px; height: 30px; border-radius: 50%;
    cursor: pointer; transition: all .2s;
    display: flex; align-items: center; justify-content: center;
    padding: 0; flex-shrink: 0;
  }
  #btn-theme { font-size: 14px; position: sticky; right: 0; }
  #data-menu-btn { font-size: 16px; }
  #btn-theme:hover, #data-menu-btn:hover { border-color: var(--cyan); }

  .ml-auto { margin-left:auto; display:flex; gap:8px; }

  /* ── MAIN LAYOUT ── */
  .main { flex:1; display:flex; overflow:hidden; }

  /* ── MAP ── */
  #map { flex:1; background:#080810; position:relative; }

  /* Override Leaflet styles for dark theme */
  .leaflet-container { background:#080810; font-family:'Share Tech Mono',monospace; }
  .leaflet-bar a { background:var(--surface)!important; color:var(--cyan)!important; border-color:var(--border)!important; }
  .leaflet-bar a:hover { background:var(--border)!important; }
  .leaflet-popup-content-wrapper {
    background:var(--surface)!important; color:var(--text)!important;
    border:1px solid var(--cyan)!important; border-radius:2px!important;
    box-shadow:0 0 20px rgba(0,245,255,.2)!important;
  }
  .leaflet-popup-tip { background:var(--surface)!important; }
  .leaflet-popup-close-button { color:var(--cyan)!important; }

  /* Cluster styles */
  .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large {
    background:rgba(0,245,255,.15)!important;
  }
  .marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div {
    background:rgba(0,245,255,.3)!important; color:var(--cyan)!important;
    font-family:'Press Start 2P',monospace!important; font-size:8px!important;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width:300px; background:var(--surface);
    border-left:2px solid var(--cyan);
    box-shadow:-6px 0 24px rgba(0,245,255,.08);
    display:flex; flex-direction:column; overflow:hidden; flex-shrink:0;
    transition: width .25s ease;
  }
  .sidebar.collapsed { width: 36px; }
  .sidebar.collapsed .poi-list,
  .sidebar.collapsed #list-count { display: none; }
  .sidebar-header { cursor: pointer; user-select: none; }
  .sidebar-header {
    padding:12px 14px; border-bottom:1px solid var(--border);
    font-family:'Press Start 2P',monospace; font-size:8px; color:var(--cyan); letter-spacing:1px;
    background: linear-gradient(90deg, rgba(0,245,255,.05) 0%, transparent 100%);
  }
  .poi-list { flex:1; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
  .poi-list::-webkit-scrollbar { width:4px; }
  .poi-list::-webkit-scrollbar-thumb { background:var(--border); }

  .poi-item {
    padding:10px 14px; border-bottom:1px solid var(--border); cursor:pointer;
    transition:background .15s; display:flex; align-items:center; gap:10px;
  }
  .poi-item:hover { background:rgba(0,245,255,.07); }
  .poi-item.visited { opacity:.4; }
  .poi-item.selected { background:rgba(0,245,255,.12); border-left:3px solid var(--cyan); padding-left:11px; }
  .poi-icon { font-size:14px; flex-shrink:0; }
  .poi-info { flex:1; min-width:0; }
  .poi-id { font-family:'Press Start 2P',monospace; font-size:7px; color:var(--yellow); margin-bottom:3px; }
  .poi-city { font-size:10px; color:#9090a0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .poi-status { font-size:9px; padding:2px 6px; border-radius:2px; flex-shrink:0; }
  .s-ok       { background:rgba(57,255,20,.15);  color:var(--green);  border:1px solid rgba(57,255,20,.3); }
  .s-damaged  { background:rgba(255,214,10,.15); color:var(--yellow); border:1px solid rgba(255,214,10,.3); }
  .s-destroyed{ background:rgba(255,45,85,.15);  color:var(--red);    border:1px solid rgba(255,45,85,.3); }
  .s-hidden   { background:rgba(191,90,242,.15); color:var(--purple); border:1px solid rgba(191,90,242,.3); }

  /* ── PHOTO MODAL ── */
  #photo-modal {
    display:none; position:fixed; inset:0; z-index:9000;
    background:rgba(0,0,0,.85);
    flex-direction:column; align-items:center; justify-content:center; gap:16px;
    padding:16px;
  }
  #photo-modal.open { display:flex; }
  #photo-preview {
    max-width:100%; max-height:70vh;
    border:1px solid var(--cyan); border-radius:2px;
    object-fit:contain;
  }
  #photo-modal-actions { display:flex; gap:12px; }
  #photo-modal-actions button {
    font-family:'Press Start 2P',monospace; font-size:8px;
    padding:10px 16px; border:none; border-radius:2px; cursor:pointer;
  }
  #photo-share-btn    { background:var(--cyan);   color:#000; }
  #photo-download-btn { background:var(--green);  color:#000; }
  #photo-close-btn    { background:transparent; color:#888; border:1px solid #444 !important; }

  /* ── LOADER ── */
  #loader {
    position:fixed; inset:0; background:var(--bg); z-index:9999;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
  }
  .loader-title { font-family:'Press Start 2P',monospace; font-size:14px; color:var(--green); text-shadow:0 0 20px var(--green); }
  .loader-sub { font-family:'Share Tech Mono',monospace; font-size:12px; color:#506070; }
  .progress-bar { width:300px; height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--green); width:0%; transition:width .3s; box-shadow:0 0 8px var(--green); }

  /* ── TOAST ── */
  #toast {
    position:fixed; bottom:calc(24px + env(safe-area-inset-bottom, 0px)); left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--surface); border:1px solid var(--green); color:var(--green);
    font-family:'Press Start 2P',monospace; font-size:8px; padding:10px 20px;
    border-radius:2px; box-shadow:0 0 20px rgba(57,255,20,.3);
    opacity:0; transition:opacity .25s, transform .25s; pointer-events:none;
    white-space:nowrap; z-index:9999;
  }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* Leaflet attribution */
  .leaflet-control-attribution { background:rgba(10,10,15,.8)!important; color:#404060!important; }
  .leaflet-control-attribution a { color:#606080!important; }

  /* Map popup content */
  .popup-body { font-family:'Share Tech Mono',monospace; min-width:160px; padding:4px 0; }
  .popup-id { font-family:'Press Start 2P',monospace; font-size:8px; color:var(--yellow); margin-bottom:8px; }
  .popup-row { font-size:11px; color:#9090a0; margin-bottom:4px; }
  .popup-search-link {
    display: block; margin: 6px 0 4px; font-size: 11px;
    color: var(--cyan); text-decoration: none;
    font-family: 'Share Tech Mono', monospace; transition: opacity .2s;
  }
  .popup-search-link:hover { opacity: .7; }
  .popup-btn {
    margin-top:10px; width:100%; padding:8px; font-family:'Press Start 2P',monospace;
    font-size:7px; border:none; cursor:pointer; border-radius:2px; transition:all .15s;
  }

  /* ── LOCATION ── */
  #fab-locate {
    position: absolute;
    bottom: calc(20px + env(safe-area-inset-bottom, 0px)); left: 16px; z-index: 999;
    background: var(--surface); border: 2px solid var(--green); color: var(--green);
    font-family: 'Press Start 2P', monospace; font-size: 12px;
    width: 46px; height: 46px; border-radius: 50%; cursor: pointer;
    box-shadow: 0 0 20px rgba(57,255,20,.3); line-height: 1; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s; padding: 0;
  }
  #fab-locate:hover { box-shadow: 0 0 30px rgba(57,255,20,.5); }

  #fab-list {
    position: absolute;
    bottom: calc(20px + env(safe-area-inset-bottom, 0px)); right: 16px; z-index: 999;
    background: var(--surface); border: 2px solid var(--cyan); color: var(--cyan);
    font-family: 'Press Start 2P', monospace; font-size: 12px;
    width: 46px; height: 46px; border-radius: 50%; cursor: pointer;
    box-shadow: 0 0 20px rgba(0,245,255,.3); line-height: 1; flex-shrink: 0;
    display: none; align-items: center; justify-content: center;
    transition: all .2s; padding: 0;
  }
  #fab-list:hover { box-shadow: 0 0 30px rgba(0,245,255,.5); }
  #fab-locate.tracking { border-color: var(--cyan); color: var(--cyan); box-shadow: 0 0 20px rgba(0,245,255,.4); animation: pulse-loc .2s ease; }

  @keyframes pulse-loc {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  .loc-dot {
    width: 16px; height: 16px; border-radius: 50%;
    background: #ff00ff; opacity: .9;
    box-shadow: 0 0 0 4px rgba(255,0,255,.2);
    animation: loc-ring 2s ease-out infinite;
  }
  @keyframes loc-ring {
    0%   { box-shadow: 0 0 0 0   rgba(255,0,255,.6); }
    100% { box-shadow: 0 0 0 14px rgba(255,0,255,.0); }
  }

  /* ── MOBILE ── */
  @media (max-width: 640px) {

    /* Collapse topbar into a scrollable single row */
    .controls {
      padding: 6px 10px;
      overflow-x: auto;
      flex-wrap: nowrap;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .controls::-webkit-scrollbar { display: none; }
    .ml-auto { margin-left: 0; }

    /* Map takes full screen */
    .main { position: relative; }
    #map { width: 100%; height: 100%; }

    /* Sidebar becomes a bottom sheet */
    .sidebar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      width: 100%;
      height: 65vh;
      border-left: none;
      border-top: 2px solid var(--cyan);
      border-radius: 12px 12px 0 0;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      z-index: 1000;
      box-shadow: 0 -8px 40px rgba(0,245,255,.15);
    }
    .sidebar.open { transform: translateY(0); }

    /* Drag handle */
    .sidebar-handle {
      display: block;
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 8px auto 4px;
      cursor: pointer;
    }

    /* Floating list button */
    #fab-list { display: flex; }

    /* Toast higher on mobile so FAB doesn't cover it */
    #toast { bottom: calc(80px + env(safe-area-inset-bottom, 0px)); }
  }

  @media (min-width: 641px) {
    .sidebar-handle { display: none; }
    #fab-list { display: none; }
    #sheet-arrow { display: inline; }
  }

</style>
</head>
<body>

<div id="photo-modal">
  <img id="photo-preview" alt="">
  <div id="photo-modal-actions">
    <button id="photo-share-btn">⬆ Share</button>
    <button id="photo-download-btn">⬇ Save</button>
    <button id="photo-close-btn">✕ Close</button>
  </div>
</div>

<div id="loader">
  <div class="loader-title">👾 INVADER HUNTER</div>
  <div class="loader-sub" id="loader-msg">Connecting to database…</div>
  <div class="progress-bar"><div class="progress-fill" id="loader-bar"></div></div>
</div>

<div id="stat-popup">
  <div class="stat-popup-row"><span>Remaining</span><span id="stat-remaining-popup" style="color:var(--cyan)">–</span></div>
  <div class="stat-popup-row"><span>Total</span><span id="stat-total">–</span></div>
  <div class="stat-popup-row"><span>Flashed</span><span id="stat-visited" style="color:var(--green)">0</span></div>
  <div class="stat-popup-row"><span>Points</span><span id="stat-points" style="color:var(--yellow)">0</span></div>
  <div class="stat-popup-row"><span>Done</span><span id="stat-pct" style="color:var(--purple)">0%</span></div>
</div>

<div class="controls">
  <div id="stat-remaining-btn" onclick="toggleStatPopup(event)" title="Tap for details">
    <div class="stat-val" id="stat-remaining">–</div>
  </div>
  <div class="topbar-sep"></div>
  <button class="filter-btn active" id="btn-cycle" onclick="cycleFilter()">Unflashed</button>
  <div class="ml-auto">
    <button id="data-menu-btn" onclick="toggleDataMenu(event)" title="Settings">⚙</button>
    <input type="file" id="import-input" accept=".json" style="display:none" onchange="importJSON(event)">
    <input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none">
  </div>
  <button id="btn-theme" onclick="toggleTheme()" title="Toggle theme">🌙</button>
</div>

<div id="data-popup">
  <div style="padding:8px 10px">
    <input type="text" id="search" placeholder="Search ID…" onclick="event.stopPropagation()">
  </div>
  <div style="height:1px;background:var(--border)"></div>
  <div class="data-menu-item" onclick="exportJSON();closeDataMenu()">⬇ Export</div>
  <div class="data-menu-item" onclick="document.getElementById('import-input').click();closeDataMenu()">⬆ Import</div>
  <div class="data-menu-item data-menu-danger" onclick="if(confirm('Reset all flashed mosaics?')){clearVisited();closeDataMenu()}">⟳ Reset</div>
</div>

<div class="main">
  <div id="map"></div>

  <div class="sidebar">
    <div class="sidebar-handle" onclick="toggleSheet()"></div>
    <div class="sidebar-header" onclick="handleSidebarClick()">📡 <span class="sidebar-title">POI LIST <span id="list-count" style="color:#606080;margin-left:8px"></span></span> <span id="sheet-arrow" style="float:right;color:#606080">◀</span></div>
    <div class="poi-list" id="poi-list"></div>
  </div>
  <button id="fab-locate" onclick="toggleLocate()" title="My location">◎</button>
  <button id="fab-list" onclick="toggleSheet()">≡</button>
</div>

<div id="toast"></div>

<script>
// ─────────────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────────────
const JSON_URL = './world_invaders.json';
const STORAGE_KEY = 'invader_visited_v1';

// ─────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────
let allPOI = [];
let filteredPOI = [];
let selectedId = null;
let leafletMap = null;
let clusterGroup = null;
let markerMap = {};   // id → L.CircleMarker

// ─────────────────────────────────────────────────────────────
// VISITED PERSISTENCE
// ─────────────────────────────────────────────────────────────
function getVisited() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; }
}
function saveVisited(v) { localStorage.setItem(STORAGE_KEY, JSON.stringify(v)); }

function toggleVisited(id) {
  const v = getVisited();
  if (v[id]) delete v[id]; else v[id] = Date.now();
  saveVisited(v);
  refreshAll();
}

function clearVisited() { localStorage.removeItem(STORAGE_KEY); refreshAll(); }

function exportJSON() {
  const v = getVisited();
  if (!Object.keys(v).length) { alert('Nothing flashed yet!'); return; }
  const payload = {
    version: 1,
    exported_at: new Date().toISOString(),
    flashed: v,
  };
  const a = document.createElement('a');
  a.href = 'data:application/json,' + encodeURIComponent(JSON.stringify(payload, null, 2));
  a.download = 'invaders_flashed.json';
  a.click();
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const payload = JSON.parse(e.target.result);
      const incoming = payload.flashed || payload;
      if (typeof incoming !== 'object' || Array.isArray(incoming))
        throw new Error('Unexpected format');
      saveVisited({ ...getVisited(), ...incoming });
      refreshAll();
      const n = Object.keys(incoming).length;
      showToast(`✓ Imported ${n} flashed invader${n !== 1 ? 's' : ''}`);
    } catch(err) {
      alert('Could not read file: ' + err.message);
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

// ─────────────────────────────────────────────────────────────
// DATA LOADING
// ─────────────────────────────────────────────────────────────
function setLoader(msg, pct) {
  document.getElementById('loader-msg').textContent = msg;
  document.getElementById('loader-bar').style.width = pct + '%';
}

async function loadData() {
  setLoader('Fetching POI database from GitHub…', 20);

  const res = await fetch(JSON_URL);
  if (!res.ok) throw new Error('HTTP ' + res.status);

  setLoader('Parsing data…', 60);
  const raw = await res.json();

  let items = Array.isArray(raw) ? raw
    : raw.invaders ? raw.invaders
    : Object.values(raw).flat();

  function parseCoord(v) { return parseFloat(String(v).replace(',', '.')); }

  function normaliseStatus(s) {
    if (!s) return 'ok';
    const l = s.toLowerCase();
    if (l === 'ok') return 'ok';
    if (l.includes('destroy') || l.includes('gone') || l.includes('missing')) return 'destroyed';
    if (l.includes('hidden') || l.includes('covered')) return 'hidden';
    if (l.includes('damage') || l.includes('little') || l.includes('partial')) return 'damaged';
    return 'ok';
  }

  allPOI = items.filter(p => {
    if (!p || p.lat == null || p.lng == null) return false;
    const la = parseCoord(p.lat), lo = parseCoord(p.lng);
    return !isNaN(la) && !isNaN(lo) && la !== 0 && lo !== 0;
  }).map(p => ({
    ...p,
    lat: parseCoord(p.lat),
    lng: parseCoord(p.lng),
    status: normaliseStatus(p.status),
    id: p.id || p.name || '?',
  }));

  setLoader('Rendering map…', 90);

  initMap();
  refreshAll();

  setLoader('Ready!', 100);
  setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 400);

  startLocate();
}

// ─────────────────────────────────────────────────────────────
// MAP INIT
// ─────────────────────────────────────────────────────────────
function initMap() {
  leafletMap = L.map('map', {
    center: [48.857, 2.347],
    zoom: 13,
    maxZoom: 22,
    zoomControl: true,
  });

  window._tileLayer = L.tileLayer(isLight
    ? 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png'
    : 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/attributions">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 22,
    maxNativeZoom: 19,
  });
  window._tileLayer.addTo(leafletMap);

  clusterGroup = L.markerClusterGroup({
    maxClusterRadius(zoom) {
      if (zoom >= 18) return 10;
      if (zoom >= 16) return 20;
      if (zoom >= 14) return 35;
      if (zoom >= 12) return 55;
      return 80;
    },
    disableClusteringAtZoom: 20,
    showCoverageOnHover: false,
    iconCreateFunction(cluster) {
      const n = cluster.getChildCount();
      const light = document.body.classList.contains('light');
      const bg     = light ? 'rgba(0,100,200,.15)'  : 'rgba(0,245,255,.18)';
      const border = light ? 'rgba(0,100,200,.6)'   : 'rgba(0,245,255,.5)';
      const color  = light ? '#0055bb'               : '#00f5ff';
      const shadow = light ? 'rgba(0,100,200,.25)'  : 'rgba(0,245,255,.3)';
      return L.divIcon({
        html: `<div style="
          background:${bg};border:1px solid ${border};
          border-radius:50%;width:36px;height:36px;display:flex;align-items:center;
          justify-content:center;font-family:'Press Start 2P',monospace;font-size:10px;
          color:${color};box-shadow:0 0 10px ${shadow};">${n > 999 ? '1k+' : n}</div>`,
        className: '',
        iconSize: [36, 36],
      });
    },
  });
  leafletMap.addLayer(clusterGroup);

  leafletMap.on('moveend zoomend', renderList);
}

// ─────────────────────────────────────────────────────────────
// FILTERS
// ─────────────────────────────────────────────────────────────
const FILTER_STATES = [
  { key: 'unvisited',  label: 'Unflashed', hideDestroyed: true  },
  { key: 'visited',    label: 'Flashed',   hideDestroyed: true  },
  { key: 'destroyed',  label: 'Destroyed', hideDestroyed: false },
  { key: 'all',        label: 'All',       hideDestroyed: false },
];
let filterIndex = 0;

function cycleFilter() {
  filterIndex = (filterIndex + 1) % FILTER_STATES.length;
  const state = FILTER_STATES[filterIndex];
  document.getElementById('btn-cycle').textContent = state.label;
  refreshAll();
}

function applyFilters(visited = getVisited()) {
  const search = document.getElementById('search').value.trim().toUpperCase();
  const state = FILTER_STATES[filterIndex];

  filteredPOI = allPOI.filter(p => {
    if (search && !(p.id || '').toUpperCase().includes(search)) return false;
    const isV = !!visited[p.id];
    if (state.key === 'visited'   && !isV) return false;
    if (state.key === 'unvisited' &&  isV) return false;
    if (state.key === 'destroyed' && p.status !== 'destroyed') return false;
    if (state.key !== 'destroyed' && state.hideDestroyed && p.status === 'destroyed') return false;
    return true;
  });
}

// ─────────────────────────────────────────────────────────────
// REFRESH
// ─────────────────────────────────────────────────────────────
function refreshAll() {
  const visited = getVisited();
  applyFilters(visited);
  updateStats(visited);
  renderMapMarkers(visited);
  renderList(visited);
}

function updateStats(visited = getVisited()) {
  const vc = allPOI.filter(p => visited[p.id]).length;
  const pts = allPOI.filter(p => visited[p.id]).reduce((s,p) => s + (Number(p.points)||0), 0);
  const pct = allPOI.length ? Math.round(vc / allPOI.length * 100) : 0;
  const rem = (allPOI.length - vc).toLocaleString();
  document.getElementById('stat-remaining').textContent       = rem;
  document.getElementById('stat-remaining-popup').textContent = rem;
  document.getElementById('stat-total').textContent           = allPOI.length.toLocaleString();
  document.getElementById('stat-visited').textContent         = vc.toLocaleString();
  document.getElementById('stat-points').textContent          = pts.toLocaleString();
  document.getElementById('stat-pct').textContent             = pct + '%';
}

function toggleStatPopup(e) {
  e.stopPropagation();
  const popup = document.getElementById('stat-popup');
  if (popup.classList.contains('open')) { popup.classList.remove('open'); return; }
  const rect = document.getElementById('stat-remaining-btn').getBoundingClientRect();
  popup.style.top  = (rect.bottom + 6) + 'px';
  popup.style.left = rect.left + 'px';
  popup.classList.add('open');
}

function toggleDataMenu(e) {
  e.stopPropagation();
  const popup = document.getElementById('data-popup');
  if (popup.classList.contains('open')) { popup.classList.remove('open'); return; }
  const rect = document.getElementById('data-menu-btn').getBoundingClientRect();
  popup.style.top  = (rect.bottom + 6) + 'px';
  popup.style.left = (rect.right - 180) + 'px';
  popup.classList.add('open');
  setTimeout(() => document.getElementById('search').focus(), 50);
}

function closeDataMenu() {
  document.getElementById('data-popup').classList.remove('open');
}

document.addEventListener('click', () => {
  document.getElementById('stat-popup').classList.remove('open');
  document.getElementById('data-popup').classList.remove('open');
});

// ─────────────────────────────────────────────────────────────
// MAP MARKERS
// ─────────────────────────────────────────────────────────────
const STATUS_COLOR = {
  ok:        '#39ff14',
  damaged:   '#ffd60a',
  destroyed: '#ff2d55',
  hidden:    '#bf5af2',
};

function renderMapMarkers(visited = getVisited()) {
  if (!clusterGroup) return;

  clusterGroup.clearLayers();
  markerMap = {};

  filteredPOI.forEach(p => {
    const isV = !!visited[p.id];
    const color = isV ? '#ff8c00' : (STATUS_COLOR[p.status] || '#39ff14');
    const opacity = isV ? 0.4 : 0.85;

    const m = L.circleMarker([p.lat, p.lng], {
      radius: 7,
      fillColor: color,
      fillOpacity: opacity,
      color: isV ? '#cc6600' : '#000',
      weight: isV ? 0.5 : 1.5,
    });

    m.bindPopup(() => buildPopup(p), { maxWidth: 220 });
    m.on('click', () => { selectedId = p.id; renderList(); });

    clusterGroup.addLayer(m);
    markerMap[p.id] = m;
  });
}

function buildPopup(p) {
  const visited = getVisited();
  const isV = !!visited[p.id];
  const color = STATUS_COLOR[p.status] || '#39ff14';
  const div = document.createElement('div');
  div.className = 'popup-body';
  div.innerHTML = `
    <div class="popup-id">${p.id}</div>
    <div class="popup-row">📍 ${p.city || '–'}</div>
    <div class="popup-row" style="color:${color}">⬡ ${p.status || 'ok'}</div>
    ${p.points ? `<div class="popup-row">⭐ ${p.points} pts</div>` : ''}
    <a class="popup-search-link" href="https://www.google.com/search?q=${encodeURIComponent(p.id + ' invader')}&tbm=isch" target="_blank" rel="noopener">🔍 Google Images</a>
    <button class="popup-btn" id="pbtn-${p.id}"
      style="background:${isV?'#ff8c00':'var(--green)'};color:#000;border:none">
      ${isV ? '✓ FLASHED' : '⚡ FLASH IT'}
    </button>
    <button class="popup-btn" id="photo-btn-${p.id}"
      style="background:var(--purple);color:#fff;border:none;margin-top:6px">
      📷 Photo
    </button>`;
  div.querySelector(`#pbtn-${p.id}`).addEventListener('click', () => {
    toggleVisited(p.id);
    const isNowV = !!getVisited()[p.id];
    const btn = div.querySelector(`#pbtn-${p.id}`);
    btn.style.background = isNowV ? '#ff8c00' : 'var(--green)';
    btn.textContent = isNowV ? '✓ FLASHED' : '⚡ FLASH IT';
  });
  div.querySelector(`#photo-btn-${p.id}`).addEventListener('click', () => takePhoto(p.id));
  return div;
}

// ─────────────────────────────────────────────────────────────
// PHOTO
// ─────────────────────────────────────────────────────────────
let currentPhotoPOI = null;
let currentPhotoBlob = null;
let currentPhotoFname = null;

function takePhoto(poiId) {
  currentPhotoPOI = poiId;
  document.getElementById('photo-input').click();
}

document.getElementById('photo-input').addEventListener('change', async e => {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file || !currentPhotoPOI) return;
  const poi = allPOI.find(p => p.id === currentPhotoPOI);
  currentPhotoPOI = null;
  if (!poi) return;

  await document.fonts.ready;
  const img = await new Promise((res, rej) => {
    const url = URL.createObjectURL(file);
    const i = new Image();
    i.onload = () => { URL.revokeObjectURL(url); res(i); };
    i.onerror = rej;
    i.src = url;
  });

  const canvas = document.createElement('canvas');
  canvas.width  = img.naturalWidth;
  canvas.height = img.naturalHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0);

  const W = canvas.width, H = canvas.height;
  const barH = Math.round(H * 0.09);
  const pad   = Math.round(W * 0.025);

  ctx.fillStyle = 'rgba(10,10,15,0.78)';
  ctx.fillRect(0, H - barH, W, barH);

  const idSize = Math.round(barH * 0.38);
  ctx.font = `${idSize}px "Press Start 2P", monospace`;
  ctx.fillStyle = '#39ff14';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  ctx.fillText('👾 ' + poi.id, pad, H - barH / 2);

  const dateStr = new Date().toLocaleDateString('en-GB');
  ctx.font = `${Math.round(barH * 0.28)}px "Share Tech Mono", monospace`;
  ctx.fillStyle = '#00f5ff';
  ctx.textAlign = 'right';
  ctx.fillText(dateStr, W - pad, H - barH / 2);

  currentPhotoBlob  = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.92));
  currentPhotoFname = `invader_${poi.id}_${new Date().toISOString().slice(0,10)}.jpg`;

  const previewUrl = URL.createObjectURL(currentPhotoBlob);
  document.getElementById('photo-preview').src = previewUrl;
  document.getElementById('photo-modal').classList.add('open');
});

document.getElementById('photo-share-btn').addEventListener('click', async () => {
  if (!currentPhotoBlob) return;
  const f = new File([currentPhotoBlob], currentPhotoFname, { type: 'image/jpeg' });
  try {
    await navigator.share({ files: [f], title: currentPhotoFname });
  } catch (err) {
    if (err.name !== 'AbortError') downloadBlob(currentPhotoBlob, currentPhotoFname);
  }
});

document.getElementById('photo-download-btn').addEventListener('click', () => {
  if (currentPhotoBlob) downloadBlob(currentPhotoBlob, currentPhotoFname);
});

document.getElementById('photo-close-btn').addEventListener('click', () => {
  document.getElementById('photo-modal').classList.remove('open');
  URL.revokeObjectURL(document.getElementById('photo-preview').src);
  document.getElementById('photo-preview').src = '';
  currentPhotoBlob = currentPhotoFname = null;
});

// Hide share button if Web Share API unavailable
if (!navigator.share) document.getElementById('photo-share-btn').style.display = 'none';

function downloadBlob(blob, fname) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = fname; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ─────────────────────────────────────────────────────────────
// SIDEBAR LIST
// ─────────────────────────────────────────────────────────────
const STATUS_ICON = { ok:'👾', damaged:'⚠️', destroyed:'💀', hidden:'🔵' };

function renderList(visited = getVisited()) {
  const list = document.getElementById('poi-list');

  let visible = filteredPOI;
  if (leafletMap) {
    const bounds = leafletMap.getBounds();
    visible = filteredPOI.filter(p => bounds.contains([p.lat, p.lng]));
  }

  document.getElementById('list-count').textContent = `(${visible.length})`;

  const shown = visible.slice(0, 250);
  list.innerHTML = shown.map(p => {
    const isV = !!visited[p.id];
    const icon = isV ? '✅' : (STATUS_ICON[p.status] || '👾');
    return `<div class="poi-item${isV?' visited':''}${p.id===selectedId?' selected':''}" onclick="selectPOI('${escId(p.id)}')">
      <div class="poi-icon">${icon}</div>
      <div class="poi-info">
        <div class="poi-id">${p.id}</div>
        <div class="poi-city">${p.city || '–'}</div>
      </div>
      <div class="poi-status s-${p.status}">${p.status}</div>
    </div>`;
  }).join('');

  if (visible.length > 250) {
    list.innerHTML += `<div style="padding:12px;font-size:10px;color:#506070;text-align:center">
      +${(visible.length-250).toLocaleString()} more — zoom in to narrow down</div>`;
  }
}

function escId(id) { return (id+'').replace(/'/g,"\\'"); }

// ─────────────────────────────────────────────────────────────
// SELECT POI
// ─────────────────────────────────────────────────────────────
function selectPOI(id) {
  selectedId = id;
  const p = allPOI.find(x => x.id === id);
  if (!p) return;
  renderList();

  if (markerMap[id]) {
    leafletMap.setView([p.lat, p.lng], Math.max(leafletMap.getZoom(), 16), { animate:true });
    setTimeout(() => {
      if (markerMap[id]) markerMap[id].openPopup();
    }, 350);
  }
}

// ─────────────────────────────────────────────────────────────
// EVENT LISTENERS
// ─────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', refreshAll);

// ─────────────────────────────────────────────────────────────
// THEME
// ─────────────────────────────────────────────────────────────
let isLight = localStorage.getItem('theme') === 'light';

function applyTheme() {
  document.body.classList.toggle('light', isLight);
  document.getElementById('btn-theme').textContent = isLight ? '🌙' : '☀️';
  localStorage.setItem('theme', isLight ? 'light' : 'dark');

  if (window._tileLayer && leafletMap) {
    leafletMap.removeLayer(window._tileLayer);
    const url = isLight
      ? 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png'
      : 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
    window._tileLayer = L.tileLayer(url, {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: 'abcd', maxZoom: 22, maxNativeZoom: 19,
    }).addTo(leafletMap);
  }

  if (clusterGroup) { renderMapMarkers(); }
  if (locAccCircle) { locAccCircle.setStyle({ color: '#ff00ff', fillColor: '#ff00ff' }); }
}

function toggleTheme() {
  isLight = !isLight;
  applyTheme();
}

if (isLight) document.body.classList.add('light');

// ─────────────────────────────────────────────────────────────
// DESKTOP SIDEBAR COLLAPSE
// ─────────────────────────────────────────────────────────────
let sidebarCollapsed = false;

function handleSidebarClick() {
  if (window.innerWidth > 640) {
    toggleSidebar();
  } else {
    toggleSheet();
  }
}

function toggleSidebar() {
  sidebarCollapsed = !sidebarCollapsed;
  document.querySelector('.sidebar').classList.toggle('collapsed', sidebarCollapsed);
  document.getElementById('sheet-arrow').textContent = sidebarCollapsed ? '▶' : '◀';
  if (!sidebarCollapsed) renderList();
  setTimeout(() => leafletMap && leafletMap.invalidateSize(), 260);
}

// ─────────────────────────────────────────────────────────────
// GEOLOCATION
// ─────────────────────────────────────────────────────────────
let locMarker = null;
let locAccCircle = null;
let locWatchId = null;
let isTracking = false;

function toggleLocate() {
  if (isTracking) stopLocate(); else startLocate();
}

function startLocate() {
  if (!navigator.geolocation) {
    showToast('⚠ Geolocation not supported');
    return;
  }
  isTracking = true;
  document.getElementById('fab-locate').classList.add('tracking');
  document.getElementById('fab-locate').textContent = '◉';

  locWatchId = navigator.geolocation.watchPosition(
    onLocation,
    onLocationError,
    { enableHighAccuracy: true, maximumAge: 5000 }
  );
}

function stopLocate() {
  isTracking = false;
  if (locWatchId !== null) navigator.geolocation.clearWatch(locWatchId);
  locWatchId = null;
  document.getElementById('fab-locate').classList.remove('tracking');
  document.getElementById('fab-locate').textContent = '◎';
  if (locMarker)    { locMarker.remove();    locMarker = null; }
  if (locAccCircle) { locAccCircle.remove(); locAccCircle = null; }
}

function onLocation(pos) {
  const { latitude: lat, longitude: lng, accuracy } = pos.coords;
  const latlng = [lat, lng];

  if (locAccCircle) {
    locAccCircle.setLatLng(latlng).setRadius(accuracy);
  } else {
    locAccCircle = L.circle(latlng, {
      radius: accuracy,
      color: '#ff00ff', fillColor: '#ff00ff',
      fillOpacity: 0.08, weight: 1, opacity: 0.4,
    }).addTo(leafletMap);
  }

  if (locMarker) {
    locMarker.setLatLng(latlng);
  } else {
    const dotIcon = L.divIcon({
      className: '',
      html: '<div class="loc-dot"></div>',
      iconSize: [16, 16],
      iconAnchor: [8, 8],
    });
    locMarker = L.marker(latlng, { icon: dotIcon, zIndexOffset: 1000 }).addTo(leafletMap);
    leafletMap.setView(latlng, Math.max(leafletMap.getZoom(), 16), { animate: true });
  }
}

function onLocationError(err) {
  const msgs = {
    1: '⚠ Location access denied',
    2: '⚠ Position unavailable',
    3: '⚠ Location request timed out',
  };
  showToast(msgs[err.code] || '⚠ Location error');
  if (err.code === 1) stopLocate();
}

// ─────────────────────────────────────────────────────────────
// MOBILE BOTTOM SHEET
// ─────────────────────────────────────────────────────────────
let sheetOpen = false;

function toggleSheet() {
  if (window.innerWidth > 640) return;
  sheetOpen = !sheetOpen;
  document.querySelector('.sidebar').classList.toggle('open', sheetOpen);
  document.getElementById('sheet-arrow').textContent = sheetOpen ? '▼' : '▲';
  document.getElementById('fab-list').style.display = sheetOpen ? 'none' : 'flex';
  if (sheetOpen) renderList();
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('map').addEventListener('click', () => {
    if (sheetOpen && window.innerWidth <= 640) toggleSheet();
  });
});

// ─────────────────────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────────────────────
function showToast(msg, duration=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), duration);
}

// ─────────────────────────────────────────────────────────────
// SERVICE WORKER
// ─────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log('SW registered'))
      .catch(e => console.warn('SW failed:', e));
  });
}

// ─────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────
loadData().catch(err => {
  document.getElementById('loader-msg').textContent = '⚠ Failed: ' + err.message;
  document.getElementById('loader-bar').style.background = 'var(--red)';
  document.getElementById('loader-bar').style.width = '100%';
});
</script>
</body>
</html>
