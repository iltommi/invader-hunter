<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --green: #39ff14;
    --cyan: #00f5ff;
    --red: #ff2d55;
    --yellow: #ffd60a;
    --purple: #bf5af2;
    --text: #e0e0f0;
  }

  /* ── LIGHT THEME ── */
  body.light {
    --bg: #f4f4f0;
    --surface: #ffffff;
    --border: #dcdcd0;
    --green: #1a9e00;
    --cyan: #0070cc;
    --red: #d0002a;
    --yellow: #b07800;
    --purple: #7700cc;
    --text: #1a1a1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Share Tech Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    height: 100svh; /* shrinks to exclude browser chrome on Android Chrome */
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOPBAR ── */
  .stat-val { font-family:'Press Start 2P',monospace; font-size:9px; color:var(--cyan); text-shadow:0 0 6px var(--cyan); }

  #stat-remaining-btn {
    display:flex; flex-direction:column; align-items:center; gap:1px;
    cursor:pointer; flex-shrink:0;
    padding: 2px 6px; border-radius:2px; transition:background .15s;
  }
  #stat-remaining-btn:hover { background:rgba(0,245,255,.08); }

  #stat-popup {
    display:none; position:fixed;
    background:var(--surface); border:1px solid var(--cyan);
    border-radius:2px; padding:10px 14px; z-index:2000;
    min-width:150px; box-shadow:0 4px 20px rgba(0,245,255,.2);
    font-family:'Share Tech Mono',monospace;
  }
  #stat-popup.open { display:block; }
  .stat-popup-row {
    display:flex; justify-content:space-between; gap:16px;
    padding:3px 0; font-size:11px; color:#9090a0;
  }
  .stat-popup-row span:last-child {
    font-family:'Press Start 2P',monospace; font-size:7px; color:var(--text);
  }

  #data-popup {
    display:none; position:fixed;
    background:var(--surface); border:1px solid var(--border);
    border-radius:2px; z-index:2000; min-width:180px;
    box-shadow:0 4px 20px rgba(0,0,0,.3);
    font-family:'Share Tech Mono',monospace; overflow:hidden;
  }
  #data-popup input[type="text"] {
    width:100%; background:var(--bg); border:1px solid var(--border);
    color:var(--text); height:28px; padding:0 8px;
    font-family:'Share Tech Mono',monospace; font-size:11px;
    border-radius:2px; outline:none; box-sizing:border-box;
  }
  #data-popup input[type="text"]:focus { border-color:var(--cyan); }
  #data-popup.open { display:block; }
  .data-menu-item {
    padding:9px 14px; font-size:11px; cursor:pointer;
    color:var(--text); transition:background .15s;
  }
  .data-menu-item:hover { background:rgba(0,245,255,.08); color:var(--cyan); }
  .data-menu-item.active { color:var(--cyan); }
  .data-menu-danger { color:var(--red); }
  .data-menu-danger:hover { background:rgba(255,45,85,.08); color:var(--red); }

  .topbar-sep { width:1px; height:20px; background:var(--border); flex-shrink:0; }

  /* ── CONTROLS ── */
  .controls {
    background: var(--surface);
    border-bottom: 2px solid var(--green);
    padding: 6px 16px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }
  .controls::after {
    content:'';
    position:absolute;
    inset:0;
    background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,245,255,.015) 2px,rgba(0,245,255,.015) 4px);
    pointer-events:none;
  }

  /* Shared height/font for controls */
  .controls input,
  .filter-btn {
    height: 30px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 0 10px;
    border-radius: 2px;
    box-sizing: border-box;
    line-height: 28px;
  }

  .controls input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    outline: none;
    transition: border-color .2s;
  }
  .controls input:focus { border-color: var(--cyan); }

  .filter-btn {
    background: transparent; border: none; color: #888;
    cursor: pointer; transition: all .2s; font-size: 13px;
  }
  #btn-cycle { min-width: 80px; }
  .filter-btn.active { color:var(--cyan); }
  .filter-btn:hover { color:var(--text); }

  /* Circular icon buttons (theme toggle, gear) */
  #btn-theme, #data-menu-btn {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    width: 30px; height: 30px; border-radius: 50%;
    cursor: pointer; transition: all .2s;
    display: flex; align-items: center; justify-content: center;
    padding: 0; flex-shrink: 0;
  }
  #btn-theme { font-size: 14px; position: sticky; right: 0; }
  #data-menu-btn { font-size: 16px; }
  #btn-theme:hover, #data-menu-btn:hover { border-color: var(--cyan); }

  #toolbar-photo-btn {
    background: var(--red); border: 1px solid var(--red); color: #fff;
    width: 30px; height: 30px; border-radius: 50%;
    cursor: pointer; transition: background .4s, border-color .4s;
    display: flex; align-items: center; justify-content: center;
    padding: 0; flex-shrink: 0; font-size: 14px;
  }
  #toolbar-photo-btn.ml-loading { background: var(--yellow); border-color: var(--yellow); color: #000; }
  #toolbar-photo-btn.ml-ready   { background: var(--green);  border-color: var(--green);  color: #000; }
  #toolbar-photo-btn.ml-error   { background: #000;          border-color: #444;          color: #888; }

  .ml-auto { margin-left:auto; display:flex; gap:8px; }

  /* ── MAIN LAYOUT ── */
  .main { flex:1; display:flex; overflow:hidden; }

  /* ── MAP ── */
  #map { flex:1; background:#080810; position:relative; }

  /* Override Leaflet styles for dark theme */
  .leaflet-container { background:#080810; font-family:'Share Tech Mono',monospace; }
  .leaflet-bar a { background:var(--surface)!important; color:var(--cyan)!important; border-color:var(--border)!important; }
  .leaflet-bar a:hover { background:var(--border)!important; }
  .leaflet-popup-content-wrapper {
    background:var(--surface)!important; color:var(--text)!important;
    border:1px solid var(--cyan)!important; border-radius:2px!important;
    box-shadow:0 0 20px rgba(0,245,255,.2)!important;
  }
  .leaflet-popup-tip { background:var(--surface)!important; }
  .leaflet-popup-close-button { color:var(--cyan)!important; }

  /* Cluster styles */
  .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large {
    background:rgba(0,245,255,.15)!important;
  }
  .marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div {
    background:rgba(0,245,255,.3)!important; color:var(--cyan)!important;
    font-family:'Press Start 2P',monospace!important; font-size:8px!important;
  }

  /* ── SIDEBAR (shared drawer foundation) ── */
  .sidebar {
    background:var(--surface);
    display:flex; flex-direction:column; overflow:hidden;
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    z-index: 1000;
  }
  .sidebar-header { cursor: pointer; user-select: none; }
  .sidebar-header {
    padding:12px 14px; border-bottom:1px solid var(--border);
    font-family:'Press Start 2P',monospace; font-size:8px; color:var(--cyan); letter-spacing:1px;
    background: linear-gradient(90deg, rgba(0,245,255,.05) 0%, transparent 100%);
  }
  .poi-list { flex:1; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
  .poi-list::-webkit-scrollbar { width:4px; }
  .poi-list::-webkit-scrollbar-thumb { background:var(--border); }

  .poi-item {
    padding:10px 14px; border-bottom:1px solid var(--border); cursor:pointer;
    transition:background .15s; display:flex; align-items:center; gap:10px;
  }
  .poi-item:hover { background:rgba(0,245,255,.07); }
  .poi-item.visited { opacity:.4; }
  .poi-item.selected { background:rgba(0,245,255,.12); border-left:3px solid var(--cyan); padding-left:11px; }
  .poi-icon { font-size:14px; flex-shrink:0; }
  .poi-info { flex:1; min-width:0; }
  .poi-id { font-family:'Press Start 2P',monospace; font-size:7px; color:var(--yellow); margin-bottom:3px; }
  .poi-city { font-size:10px; color:#9090a0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .poi-status { font-size:9px; padding:2px 6px; border-radius:2px; flex-shrink:0; }
  .s-ok       { background:rgba(57,255,20,.15);  color:var(--green);  border:1px solid rgba(57,255,20,.3); }
  .s-damaged  { background:rgba(255,214,10,.15); color:var(--yellow); border:1px solid rgba(255,214,10,.3); }
  .s-destroyed{ background:rgba(255,45,85,.15);  color:var(--red);    border:1px solid rgba(255,45,85,.3); }
  .s-hidden   { background:rgba(191,90,242,.15); color:var(--purple); border:1px solid rgba(191,90,242,.3); }

  /* ── PHOTO MODAL ── */
  #photo-modal {
    display:none; position:fixed; inset:0; z-index:9000;
    background:rgba(0,0,0,.85);
    flex-direction:column; align-items:center; justify-content:center; gap:16px;
    padding:16px;
  }
  #photo-modal.open { display:flex; }
  #photo-preview {
    max-width:100%; max-height:70vh;
    border:1px solid var(--cyan); border-radius:2px;
    object-fit:contain;
  }
  #photo-modal-actions { display:flex; gap:12px; }
  #photo-modal-actions button {
    font-family:'Press Start 2P',monospace; font-size:8px;
    padding:10px 16px; border:none; border-radius:2px; cursor:pointer;
  }
  #photo-share-btn    { background:var(--cyan);   color:#000; }
  #photo-download-btn { background:var(--green);  color:#000; }
  #photo-ai-btn       { background:var(--purple); color:#fff; }
  #photo-ai-btn:disabled { opacity:.4; cursor:default; }
  #photo-close-btn    { background:transparent; color:#888; border:1px solid #444 !important; }
  #ml-status {
    position:fixed; bottom:calc(76px + env(safe-area-inset-bottom,0px)); left:16px;
    z-index:999;
    background:var(--surface); border:1px solid var(--cyan); border-radius:2px;
    padding:5px 9px;
    font-family:'Share Tech Mono',monospace; font-size:10px;
    color:var(--cyan); display:flex; align-items:center; gap:6px;
    opacity:1; transition:opacity 1.5s ease;
    pointer-events:none;
  }
  #ml-status.hidden { opacity:0; }
  #ml-status .ml-dot {
    width:7px; height:7px; border-radius:50%; background:var(--cyan); flex-shrink:0;
  }
  #ml-status .ml-dot.pulsing { animation:ml-pulse 1.2s ease-in-out infinite; }
  @keyframes ml-pulse { 0%,100%{opacity:1} 50%{opacity:.2} }
  #ml-results {
    font-family:'Share Tech Mono',monospace; font-size:11px;
    color:var(--text); text-align:center; min-height:18px;
  }
  #ml-results .ml-hit  { color:var(--green); font-weight:bold; }
  #ml-results .ml-list { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:4px; }
  #ml-results .ml-item { color:var(--cyan); cursor:pointer; }
  #ml-results .ml-item:hover { text-decoration:underline; }

  /* ── PERSPECTIVE CORRECTION ── */
  #correct-modal {
    display:none; position:fixed; inset:0; z-index:9100;
    background:#000;
    flex-direction:column; align-items:center; justify-content:center;
    gap:12px; padding:12px;
  }
  #correct-modal.open { display:flex; }
  #correct-hint {
    font-family:'Share Tech Mono',monospace; font-size:11px; color:#888;
    text-align:center;
  }
  #correct-canvas { max-width:100%; max-height:78vh; touch-action:none; cursor:crosshair; }
  #correct-actions { display:flex; gap:12px; }
  #correct-apply-btn {
    font-family:'Press Start 2P',monospace; font-size:8px;
    padding:10px 18px; border:none; border-radius:2px; cursor:pointer;
    background:var(--cyan); color:#000;
  }
  #correct-skip-btn {
    font-family:'Press Start 2P',monospace; font-size:8px;
    padding:10px 18px; border-radius:2px; cursor:pointer;
    background:transparent; color:#888; border:1px solid #444;
  }

  /* ── LOADER ── */
  #loader {
    position:fixed; inset:0; background:var(--bg); z-index:9999;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
  }
  .loader-title { font-family:'Press Start 2P',monospace; font-size:14px; color:var(--green); text-shadow:0 0 20px var(--green); }
  .loader-sub { font-family:'Share Tech Mono',monospace; font-size:12px; color:#506070; }
  .progress-bar { width:300px; height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--green); width:0%; transition:width .3s; box-shadow:0 0 8px var(--green); }

  /* ── TOAST ── */
  #toast {
    position:fixed; bottom:calc(24px + env(safe-area-inset-bottom, 0px)); left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--surface); border:1px solid var(--green); color:var(--green);
    font-family:'Press Start 2P',monospace; font-size:8px; padding:10px 20px;
    border-radius:2px; box-shadow:0 0 20px rgba(57,255,20,.3);
    opacity:0; transition:opacity .25s, transform .25s; pointer-events:none;
    white-space:nowrap; z-index:9999;
  }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* Leaflet attribution */
  .leaflet-control-attribution { background:rgba(10,10,15,.8)!important; color:#404060!important; }
  .leaflet-control-attribution a { color:#606080!important; }

  /* Map popup content */
  .popup-body { font-family:'Share Tech Mono',monospace; min-width:160px; padding:4px 0; }
  .popup-id { font-family:'Press Start 2P',monospace; font-size:8px; color:var(--yellow); margin-bottom:8px; }
  .popup-row { font-size:11px; color:#9090a0; margin-bottom:4px; }
  .popup-search-link {
    display: block; margin: 6px 0 4px; font-size: 11px;
    color: var(--cyan); text-decoration: none;
    font-family: 'Share Tech Mono', monospace; transition: opacity .2s;
  }
  .popup-search-link:hover { opacity: .7; }
  .popup-spotter-img {
    display:block; width:100%; margin:8px 0 4px;
    border:1px solid var(--border); border-radius:2px;
    cursor:pointer;
  }
  .popup-actions {
    display:flex; gap:12px; align-items:center; margin-top:10px;
  }
  .popup-action {
    background:transparent; border:none; cursor:pointer;
    font-size:22px; line-height:1; padding:2px;
    transition:opacity .15s; text-decoration:none;
  }
  .popup-action:hover { opacity:.6; }

  /* ── LOCATION ── */
  #fab-locate {
    position: absolute;
    bottom: calc(20px + env(safe-area-inset-bottom, 0px)); left: 16px; z-index: 999;
    background: var(--surface); border: 2px solid var(--green); color: var(--green);
    font-family: 'Press Start 2P', monospace; font-size: 12px;
    width: 46px; height: 46px; border-radius: 50%; cursor: pointer;
    box-shadow: 0 0 20px rgba(57,255,20,.3); line-height: 1; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s; padding: 0;
  }
  #fab-locate:hover { box-shadow: 0 0 30px rgba(57,255,20,.5); }

  #fab-list {
    position: absolute;
    bottom: calc(20px + env(safe-area-inset-bottom, 0px)); right: 16px; z-index: 999;
    background: var(--surface); border: 2px solid var(--cyan); color: var(--cyan);
    font-family: 'Press Start 2P', monospace; font-size: 12px;
    width: 46px; height: 46px; border-radius: 50%; cursor: pointer;
    box-shadow: 0 0 20px rgba(0,245,255,.3); line-height: 1; flex-shrink: 0;
    display: none; align-items: center; justify-content: center;
    transition: all .2s; padding: 0;
  }
  #fab-list:hover { box-shadow: 0 0 30px rgba(0,245,255,.5); }
  #fab-locate.tracking { border-color: var(--cyan); color: var(--cyan); box-shadow: 0 0 20px rgba(0,245,255,.4); animation: pulse-loc .2s ease; }

  @keyframes pulse-loc {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  .loc-dot {
    width: 16px; height: 16px; border-radius: 50%;
    background: #ff00ff; opacity: .9;
    box-shadow: 0 0 0 4px rgba(255,0,255,.2);
    animation: loc-ring 2s ease-out infinite;
  }
  @keyframes loc-ring {
    0%   { box-shadow: 0 0 0 0   rgba(255,0,255,.6); }
    100% { box-shadow: 0 0 0 14px rgba(255,0,255,.0); }
  }

  /* ── MOBILE: bottom sheet ── */
  @media (max-width: 640px) {
    .controls {
      padding: 6px 10px; overflow-x: auto;
      flex-wrap: nowrap; scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .controls::-webkit-scrollbar { display: none; }
    .ml-auto { margin-left: 0; }

    .main { position: relative; }
    #map { width: 100%; height: 100%; }

    .sidebar {
      position: absolute;
      bottom: 0; left: 0; right: 0; width: 100%; height: 65vh;
      border-top: 2px solid var(--cyan);
      border-radius: 12px 12px 0 0;
      transform: translateY(100%);
      box-shadow: 0 -8px 40px rgba(0,245,255,.15);
    }
    .sidebar.open { transform: translateY(0); }

    .sidebar-handle {
      display: block; width: 40px; height: 4px;
      background: var(--border); border-radius: 2px;
      margin: 8px auto 4px; cursor: pointer;
    }

    #fab-list { display: flex; }
    #toast { bottom: calc(80px + env(safe-area-inset-bottom, 0px)); }
  }

  /* ── DESKTOP: right-side drawer ── */
  @media (min-width: 641px) {
    .main { position: relative; }
    #map { width: 100%; height: 100%; }

    .sidebar {
      position: absolute;
      top: 0; right: 0; bottom: 0; width: 320px;
      border-left: 2px solid var(--cyan);
      border-radius: 12px 0 0 12px;
      transform: translateX(100%);
      box-shadow: -8px 0 40px rgba(0,245,255,.15);
    }
    .sidebar.open { transform: translateX(0); }

    .sidebar-handle { display: none; }
    #fab-list { display: flex; }
    #sheet-arrow { display: inline; }
  }

</style>
</head>
<body>

<div id="correct-modal">
  <div id="correct-hint">Drag corners to align with the invader</div>
  <canvas id="correct-canvas"></canvas>
  <div id="correct-actions">
    <button id="correct-apply-btn">✓ Apply</button>
    <button id="correct-skip-btn">Skip</button>
  </div>
</div>

<div id="photo-modal">
  <img id="photo-preview" alt="">
  <div id="photo-modal-actions">
    <button id="photo-share-btn">⬆ Share</button>
    <button id="photo-download-btn">⬇ Save</button>
    <button id="photo-ai-btn">👾 Identify</button>
    <button id="photo-close-btn">✕ Close</button>
  </div>
  <div id="ml-results"></div>
</div>

<div id="loader">
  <div class="loader-title">👾 INVADER HUNTER</div>
  <div class="loader-sub" id="loader-msg">Connecting to database…</div>
  <div class="progress-bar"><div class="progress-fill" id="loader-bar"></div></div>
</div>

<div id="stat-popup">
  <div class="stat-popup-row"><span>Remaining</span><span id="stat-remaining-popup" style="color:var(--cyan)">–</span></div>
  <div class="stat-popup-row"><span>Total</span><span id="stat-total">–</span></div>

  <div class="stat-popup-row"><span>Points</span><span id="stat-points" style="color:var(--yellow)">0</span></div>
  <div class="stat-popup-row"><span>Done</span><span id="stat-pct" style="color:var(--purple)">0%</span></div>
  <div class="stat-popup-row"><span>Destroyed</span><span id="stat-destroyed" style="color:var(--red)">–</span></div>
  <div class="stat-popup-row"><span>No coords</span><span id="stat-nocoords" style="color:#606080">–</span></div>
</div>

<div class="controls">
  <div id="stat-remaining-btn" onclick="toggleStatPopup(event)" title="Tap for details">
    <div class="stat-val" id="stat-remaining">–</div>
  </div>
  <div class="ml-auto">
    <button id="toolbar-photo-btn" onclick="takePhoto()" title="Take photo">📷</button>

</div>

<div id="data-popup">
  <div style="padding:8px 10px">
    <input type="text" id="search" placeholder="Search ID…" onclick="event.stopPropagation()">
  </div>
  <div style="height:1px;background:var(--border)"></div>
  <div class="data-menu-item filter-menu-item" data-key="unvisited" onclick="setFilter('unvisited')">☐ Unflashed</div>
  <div class="data-menu-item filter-menu-item" data-key="visited"   onclick="setFilter('visited')">✅ Flashed</div>
  <div class="data-menu-item filter-menu-item" data-key="destroyed" onclick="setFilter('destroyed')">💀 Destroyed</div>
  <div class="data-menu-item filter-menu-item" data-key="all"       onclick="setFilter('all')">👾 All</div>
  <div style="height:1px;background:var(--border)"></div>
  <a class="data-menu-item" href="https://github.com/iltommi/invader-hunter" target="_blank" rel="noopener" style="text-decoration:none;display:block">⌂ GitHub</a>
  <div style="height:1px;background:var(--border)"></div>
  <div class="data-menu-item" onclick="exportJSON();closeDataMenu()">⬇ Export</div>
  <div class="data-menu-item" onclick="document.getElementById('import-input').click();closeDataMenu()">⬆ Import</div>

</div>

<div class="main">
  <div id="map"></div>

  <div class="sidebar">
    <div class="sidebar-handle" onclick="toggleSheet()"></div>
    <div class="sidebar-header" onclick="handleSidebarClick()">📡 <span class="sidebar-title">POI LIST <span id="list-count" style="color:#606080;margin-left:8px"></span></span> <span id="sheet-arrow" style="float:right;color:#606080">✕</span></div>
    <div class="poi-list" id="poi-list"></div>
  </div>
  <button id="fab-locate" onclick="toggleLocate()" title="My location">◎</button>
  <button id="fab-list" onclick="toggleSheet()">≡</button>
</div>

<div id="ml-status"><div class="ml-dot pulsing"></div><span>AI loading…</span></div>

<div id="toast"></div>

<script>
// ─────────────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────────────
const JSON_URL = './world_invaders.json';
const STORAGE_KEY = 'invader_visited_v1';

// ─────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────
let allPOI = [];
let filteredPOI = [];
let cityPadding = {};  // city code → zero-pad width derived from max ID number
let selectedId = null;
let leafletMap = null;
let clusterGroup = null;
let markerMap = {};   // id → L.CircleMarker

// ─────────────────────────────────────────────────────────────
// VISITED PERSISTENCE
// ─────────────────────────────────────────────────────────────
function getVisited() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; }
}
function saveVisited(v) { localStorage.setItem(STORAGE_KEY, JSON.stringify(v)); }

function toggleVisited(id) {
  const v = getVisited();
  if (v[id]) delete v[id]; else v[id] = Date.now();
  saveVisited(v);
  refreshAll();
}

function clearVisited() { localStorage.removeItem(STORAGE_KEY); refreshAll(); }

function exportJSON() {
  const v = getVisited();
  if (!Object.keys(v).length) { alert('Nothing flashed yet!'); return; }
  const payload = {
    version: 1,
    exported_at: new Date().toISOString(),
    flashed: v,
  };
  const a = document.createElement('a');
  a.href = 'data:application/json,' + encodeURIComponent(JSON.stringify(payload, null, 2));
  a.download = 'invaders_flashed.json';
  a.click();
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const payload = JSON.parse(e.target.result);
      const incoming = payload.flashed || payload;
      if (typeof incoming !== 'object' || Array.isArray(incoming))
        throw new Error('Unexpected format');
      saveVisited({ ...getVisited(), ...incoming });
      refreshAll();
      const n = Object.keys(incoming).length;
      showToast(`✓ Imported ${n} flashed invader${n !== 1 ? 's' : ''}`);
    } catch(err) {
      alert('Could not read file: ' + err.message);
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

// ─────────────────────────────────────────────────────────────
// DATA LOADING
// ─────────────────────────────────────────────────────────────
function setLoader(msg, pct) {
  document.getElementById('loader-msg').textContent = msg;
  document.getElementById('loader-bar').style.width = pct + '%';
}

// ── IndexedDB helpers ─────────────────────────────────────────
const IDB_NAME = 'invader-hunter';

function idbOpen() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(IDB_NAME, 1);
    r.onupgradeneeded = e => e.target.result.createObjectStore('kv');
    r.onsuccess = e => res(e.target.result);
    r.onerror   = e => rej(e.target.error);
  });
}
function idbGet(db, key) {
  return new Promise((res, rej) => {
    const r = db.transaction('kv').objectStore('kv').get(key);
    r.onsuccess = e => res(e.target.result);
    r.onerror   = e => rej(e.target.error);
  });
}
function idbSet(db, key, val) {
  return new Promise((res, rej) => {
    const r = db.transaction('kv', 'readwrite').objectStore('kv').put(val, key);
    r.onsuccess = () => res();
    r.onerror   = e => rej(e.target.error);
  });
}

// ── Data processing ───────────────────────────────────────────
function parseCoord(v) {
  const n = parseFloat(String(v).replace(',', '.'));
  return (!isNaN(n) && n !== 0) ? n : null;
}

function normaliseStatus(s) {
  if (!s) return 'ok';
  const l = s.toLowerCase();
  if (l === 'ok') return 'ok';
  if (l.includes('destroy') || l.includes('gone') || l.includes('missing')) return 'destroyed';
  if (l.includes('hidden') || l.includes('covered')) return 'hidden';
  if (l.includes('damage') || l.includes('little') || l.includes('partial')) return 'damaged';
  return 'ok';
}

function processItems(items) {
  allPOI = items
    .filter(p => p && (p.id || p.name))
    .map(p => ({
      ...p,
      id:     p.id || p.name || '?',
      lat:    p.lat != null ? parseCoord(p.lat) : null,
      lng:    p.lng != null ? parseCoord(p.lng) : null,
      status: normaliseStatus(p.status),
    }));

  // Build per-city padding width from the max numeric ID seen
  const maxNum = {};
  for (const p of allPOI) {
    const [code, num] = p.id.split('_');
    if (num) {
      const n = parseInt(num, 10);
      if (!maxNum[code] || n > maxNum[code]) maxNum[code] = n;
    }
  }
  cityPadding = {};
  for (const [code, n] of Object.entries(maxNum)) {
    cityPadding[code] = String(n).length;
  }
}

async function fetchFromNetwork() {
  const res = await fetch(JSON_URL);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const raw  = await res.json();
  const etag = res.headers.get('ETag') || res.headers.get('Last-Modified') || '';
  const items = Array.isArray(raw) ? raw
    : raw.invaders ? raw.invaders
    : Object.values(raw).flat();
  return { items, etag };
}

async function loadData() {
  const db = await idbOpen();
  const cached = await idbGet(db, 'pois');

  if (cached) {
    setLoader('Loading local data…', 40);
    processItems(cached.items);
    setLoader('Rendering map…', 80);
    initMap();
    refreshAll();
    setLoader('Ready!', 100);
    setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 400);
    startLocate();

    // Background refresh: fetch silently and update IDB if data changed
    fetchFromNetwork().then(async ({ items, etag }) => {
      if (etag && etag === cached.etag) return; // unchanged
      await idbSet(db, 'pois', { items, etag });
      processItems(items);
      refreshAll();
      showToast('✓ POI data updated');
    }).catch(() => {}); // offline — no problem

  } else {
    setLoader('Fetching POI database…', 20);
    const { items, etag } = await fetchFromNetwork();
    setLoader('Saving locally…', 70);
    await idbSet(db, 'pois', { items, etag });
    setLoader('Rendering map…', 90);
    processItems(items);
    initMap();
    refreshAll();
    setLoader('Ready!', 100);
    setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 400);
    startLocate();
  }
}

// ─────────────────────────────────────────────────────────────
// MAP INIT
// ─────────────────────────────────────────────────────────────
function initMap() {
  leafletMap = L.map('map', {
    center: [48.857, 2.347],
    zoom: 13,
    maxZoom: 22,
    zoomControl: true,
  });

  window._tileLayer = L.tileLayer(isLight
    ? 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png'
    : 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/attributions">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 22,
    maxNativeZoom: 19,
  });
  window._tileLayer.addTo(leafletMap);

  clusterGroup = L.markerClusterGroup({
    maxClusterRadius(zoom) {
      if (zoom >= 18) return 10;
      if (zoom >= 16) return 20;
      if (zoom >= 14) return 35;
      if (zoom >= 12) return 55;
      return 80;
    },
    disableClusteringAtZoom: 20,
    showCoverageOnHover: false,
    iconCreateFunction(cluster) {
      const n = cluster.getChildCount();
      const light = document.body.classList.contains('light');
      const bg     = light ? 'rgba(0,100,200,.15)'  : 'rgba(0,245,255,.18)';
      const border = light ? 'rgba(0,100,200,.6)'   : 'rgba(0,245,255,.5)';
      const color  = light ? '#0055bb'               : '#00f5ff';
      const shadow = light ? 'rgba(0,100,200,.25)'  : 'rgba(0,245,255,.3)';
      return L.divIcon({
        html: `<div style="
          background:${bg};border:1px solid ${border};
          border-radius:50%;width:36px;height:36px;display:flex;align-items:center;
          justify-content:center;font-family:'Press Start 2P',monospace;font-size:10px;
          color:${color};box-shadow:0 0 10px ${shadow};">${n > 999 ? '1k+' : n}</div>`,
        className: '',
        iconSize: [36, 36],
      });
    },
  });
  leafletMap.addLayer(clusterGroup);

  leafletMap.on('moveend zoomend', renderList);
}

// ─────────────────────────────────────────────────────────────
// FILTERS
// ─────────────────────────────────────────────────────────────
const FILTER_STATES = [
  { key: 'unvisited',  label: 'Unflashed', hideDestroyed: true  },
  { key: 'visited',    label: 'Flashed',   hideDestroyed: true  },
  { key: 'destroyed',  label: 'Destroyed', hideDestroyed: false },
  { key: 'all',        label: 'All',       hideDestroyed: false },
];
let filterIndex = (() => {
  const saved = localStorage.getItem('invader_filter');
  const idx = FILTER_STATES.findIndex(s => s.key === saved);
  return idx >= 0 ? idx : FILTER_STATES.findIndex(s => s.key === 'visited');
})();
_updateFilterMenu();

function _updateFilterMenu() {
  const key = FILTER_STATES[filterIndex].key;
  document.querySelectorAll('.filter-menu-item').forEach(el => {
    el.classList.toggle('active', el.dataset.key === key);
  });
}

function setFilter(key) {
  const idx = FILTER_STATES.findIndex(s => s.key === key);
  if (idx < 0) return;
  if (FILTER_STATES[filterIndex].key === 'visited' && key !== 'visited') {
    if (!confirm('Enable cheat mode?')) return;
  }
  filterIndex = idx;
  localStorage.setItem('invader_filter', key);
  _updateFilterMenu();
  closeDataMenu();
  refreshAll();
}

function applyFilters(visited = getVisited()) {
  const search = document.getElementById('search').value.trim().toUpperCase();
  const state = FILTER_STATES[filterIndex];

  filteredPOI = allPOI.filter(p => {
    if (search && !(p.id || '').toUpperCase().includes(search)) return false;
    const isV = !!visited[p.id];
    if (state.key === 'visited'   && !isV) return false;
    if (state.key === 'unvisited' &&  isV) return false;
    if (state.key === 'destroyed' && p.status !== 'destroyed') return false;
    if (state.key !== 'destroyed' && state.hideDestroyed && p.status === 'destroyed') return false;
    return true;
  });
}

// ─────────────────────────────────────────────────────────────
// REFRESH
// ─────────────────────────────────────────────────────────────
function refreshAll() {
  const visited = getVisited();
  applyFilters(visited);
  updateStats(visited);
  renderMapMarkers(visited);
  renderList(visited);
}

function updateStats(visited = getVisited()) {
  const vc = allPOI.filter(p => visited[p.id]).length;
  const pts = allPOI.filter(p => visited[p.id]).reduce((s,p) => s + (Number(p.points)||0), 0);
  const pct = allPOI.length ? Math.round(vc / allPOI.length * 100) : 0;
  const rem = (allPOI.length - vc).toLocaleString();
  document.getElementById('stat-remaining').textContent       = rem;
  document.getElementById('stat-remaining-popup').textContent = rem;
  document.getElementById('stat-total').textContent           = allPOI.length.toLocaleString();
  document.getElementById('stat-visited').textContent         = vc.toLocaleString();
  document.getElementById('stat-points').textContent          = pts.toLocaleString();
  document.getElementById('stat-pct').textContent      = pct + '%';
  document.getElementById('stat-destroyed').textContent = allPOI.filter(p => p.status === 'destroyed').length.toLocaleString();
  document.getElementById('stat-nocoords').textContent  = allPOI.filter(p => !p.lat).length.toLocaleString();
}

function toggleStatPopup(e) {
  e.stopPropagation();
  const popup = document.getElementById('stat-popup');
  if (popup.classList.contains('open')) { popup.classList.remove('open'); return; }
  const rect = document.getElementById('stat-remaining-btn').getBoundingClientRect();
  popup.style.top  = (rect.bottom + 6) + 'px';
  popup.style.left = rect.left + 'px';
  popup.classList.add('open');
}

function toggleDataMenu(e) {
  e.stopPropagation();
  const popup = document.getElementById('data-popup');
  if (popup.classList.contains('open')) { popup.classList.remove('open'); return; }
  const rect = document.getElementById('data-menu-btn').getBoundingClientRect();
  popup.style.top  = (rect.bottom + 6) + 'px';
  popup.style.left = (rect.right - 180) + 'px';
  popup.classList.add('open');
  setTimeout(() => document.getElementById('search').focus(), 50);
}

function closeDataMenu() {
  document.getElementById('data-popup').classList.remove('open');
}

document.addEventListener('click', () => {
  document.getElementById('stat-popup').classList.remove('open');
  document.getElementById('data-popup').classList.remove('open');
});

// ─────────────────────────────────────────────────────────────
// MAP MARKERS
// ─────────────────────────────────────────────────────────────
const STATUS_COLOR = {
  ok:        '#39ff14',
  damaged:   '#ffd60a',
  destroyed: '#ff2d55',
  hidden:    '#bf5af2',
};

function renderMapMarkers(visited = getVisited()) {
  if (!clusterGroup) return;

  clusterGroup.clearLayers();
  markerMap = {};

  filteredPOI.forEach(p => {
    if (!p.lat || !p.lng) return;  // no coords — skip map marker, still in list
    const isV = !!visited[p.id];
    const color = isV ? '#ff8c00' : (STATUS_COLOR[p.status] || '#39ff14');
    const opacity = isV ? 0.4 : 0.85;

    const m = L.circleMarker([p.lat, p.lng], {
      radius: 7,
      fillColor: color,
      fillOpacity: opacity,
      color: isV ? '#cc6600' : '#000',
      weight: isV ? 0.5 : 1.5,
    });

    m.bindPopup(() => buildPopup(p), { maxWidth: 220 });
    m.on('click', () => { selectedId = p.id; renderList(); });

    clusterGroup.addLayer(m);
    markerMap[p.id] = m;
  });
}

function spotterUrl(id) {
  const [code, num] = id.split('_');
  const width = cityPadding[code] || String(num).length;
  return `https://www.invader-spotter.art/grosplan/${code}/${code}_${num.padStart(width,'0')}-grosplan.png`;
}

function buildPopup(p) {
  const visited = getVisited();
  const isV = !!visited[p.id];
  const color = STATUS_COLOR[p.status] || '#39ff14';
  const div = document.createElement('div');
  div.className = 'popup-body';
  div.innerHTML = `
    <div class="popup-id">${p.id}</div>
    <div class="popup-row">${[p.city, p.status&&p.status!=='ok' ? `<span style="color:${color}">${p.status}</span>` : null, p.points ? p.points+' pts' : null].filter(Boolean).join(', ')}</div>
    <a href="${spotterUrl(p.id)}" target="_blank" rel="noopener">
      <img class="popup-spotter-img" src="${spotterUrl(p.id)}" alt="${p.id}" loading="lazy"
           onerror="this.outerHTML='<a class=\\'popup-search-link\\' href=\\'${spotterUrl(p.id)}\\' target=\\'_blank\\' rel=\\'noopener\\'>🕹 Invader Spotter</a>'">
    </a>
    <div class="popup-actions">
      <button class="popup-action" id="pbtn-${p.id}" title="${isV?'Flashed':'Flash it'}">${isV?'✅':'⚡'}</button>
      <a class="popup-action" href="https://www.google.com/search?q=${encodeURIComponent(p.id+' invader')}&tbm=isch" target="_blank" rel="noopener" title="Google Images">🔍</a>
    </div>`;
  div.querySelector(`#pbtn-${p.id}`).addEventListener('click', () => {
    toggleVisited(p.id);
    const isNowV = !!getVisited()[p.id];
    const btn = div.querySelector(`#pbtn-${p.id}`);
    btn.textContent = isNowV ? '✅' : '⚡';
    btn.title = isNowV ? 'Flashed' : 'Flash it';
  });
  return div;
}

// ─────────────────────────────────────────────────────────────
// PERSPECTIVE CORRECTION
// ─────────────────────────────────────────────────────────────

// Solve 8×8 linear system via Gaussian elimination (for homography DLT)
function gaussSolve(A, b) {
  const n = b.length;
  const M = A.map((r, i) => [...r, b[i]]);
  for (let c = 0; c < n; c++) {
    let mx = c;
    for (let r = c+1; r < n; r++) if (Math.abs(M[r][c]) > Math.abs(M[mx][c])) mx = r;
    [M[c], M[mx]] = [M[mx], M[c]];
    for (let r = c+1; r < n; r++) {
      const f = M[r][c] / M[c][c];
      for (let j = c; j <= n; j++) M[r][j] -= f * M[c][j];
    }
  }
  const x = new Array(n).fill(0);
  for (let i = n-1; i >= 0; i--) {
    x[i] = M[i][n];
    for (let j = i+1; j < n; j++) x[i] -= M[i][j] * x[j];
    x[i] /= M[i][i];
  }
  return x;
}

// Compute 3×3 homography from 4 src→dst point pairs (DLT algorithm)
function getHomography(src, dst) {
  const A = [], b = [];
  for (let i = 0; i < 4; i++) {
    const [sx, sy] = src[i], [dx, dy] = dst[i];
    A.push([-sx,-sy,-1, 0,  0,  0, dx*sx, dx*sy]); b.push(-dx);
    A.push([ 0,  0,  0,-sx,-sy,-1, dy*sx, dy*sy]); b.push(-dy);
  }
  const h = gaussSolve(A, b);
  return [[h[0],h[1],h[2]],[h[3],h[4],h[5]],[h[6],h[7],1]];
}

// Perspective warp: src ImageData → OUT×OUT ImageData using 4 quad corners in src space
function warpPerspective(srcData, srcW, srcH, corners, OUT = 512) {
  const dst = [[0,0],[OUT,0],[OUT,OUT],[0,OUT]];
  const H   = getHomography(dst, corners); // inverse warp: dst→src
  const out  = new ImageData(OUT, OUT);
  const sd   = srcData.data, od = out.data;
  for (let dy = 0; dy < OUT; dy++) {
    for (let dx = 0; dx < OUT; dx++) {
      const w  = H[2][0]*dx + H[2][1]*dy + H[2][2];
      const sx = (H[0][0]*dx + H[0][1]*dy + H[0][2]) / w;
      const sy = (H[1][0]*dx + H[1][1]*dy + H[1][2]) / w;
      const x0 = Math.floor(sx), y0 = Math.floor(sy);
      const x1 = x0+1,           y1 = y0+1;
      if (x0 < 0 || y0 < 0 || x1 >= srcW || y1 >= srcH) continue;
      const fx = sx-x0, fy = sy-y0;
      const i00=(y0*srcW+x0)*4, i10=(y0*srcW+x1)*4;
      const i01=(y1*srcW+x0)*4, i11=(y1*srcW+x1)*4;
      const oi = (dy*OUT+dx)*4;
      for (let c = 0; c < 3; c++)
        od[oi+c] = (sd[i00+c]*(1-fx)*(1-fy) + sd[i10+c]*fx*(1-fy)
                  + sd[i01+c]*(1-fx)*fy     + sd[i11+c]*fx*fy) | 0;
      od[oi+3] = 255;
    }
  }
  return out;
}

// ── Correction modal state ──
let _correctImg   = null;  // HTMLImageElement of the captured photo
let _correctScale = 1;     // ratio: canvas-coords → original-image-coords
let _corners      = [];    // 4 corners in canvas coords [[x,y],…]
let _dragIdx      = -1;    // which corner is being dragged

function showCorrectionModal(imgEl) {
  _correctImg = imgEl;
  const modal  = document.getElementById('correct-modal');
  const canvas = document.getElementById('correct-canvas');

  // Fit canvas to screen
  const maxW = window.innerWidth  * 0.96;
  const maxH = window.innerHeight * 0.76;
  const scale = Math.min(maxW / imgEl.naturalWidth, maxH / imgEl.naturalHeight);
  canvas.width  = Math.round(imgEl.naturalWidth  * scale);
  canvas.height = Math.round(imgEl.naturalHeight * scale);
  _correctScale = imgEl.naturalWidth / canvas.width;

  // Init corners at image edges (inset 10%)
  const m = 0.1;
  _corners = [
    [canvas.width*m,          canvas.height*m],
    [canvas.width*(1-m),      canvas.height*m],
    [canvas.width*(1-m),      canvas.height*(1-m)],
    [canvas.width*m,          canvas.height*(1-m)],
  ];
  drawCorrection();
  modal.classList.add('open');
}

function drawCorrection() {
  const canvas = document.getElementById('correct-canvas');
  const ctx    = canvas.getContext('2d');
  ctx.drawImage(_correctImg, 0, 0, canvas.width, canvas.height);

  // Quad outline
  ctx.beginPath();
  ctx.moveTo(..._corners[0]);
  for (let i = 1; i < 4; i++) ctx.lineTo(..._corners[i]);
  ctx.closePath();
  ctx.strokeStyle = 'rgba(0,245,255,0.85)';
  ctx.lineWidth   = 2;
  ctx.stroke();

  // Corner handles
  _corners.forEach(([x,y]) => {
    ctx.beginPath();
    ctx.arc(x, y, 12, 0, Math.PI*2);
    ctx.fillStyle   = 'rgba(0,245,255,0.3)';
    ctx.strokeStyle = '#00f5ff';
    ctx.lineWidth   = 2;
    ctx.fill(); ctx.stroke();
  });
}

function correctPointerPos(e, canvas) {
  const r  = canvas.getBoundingClientRect();
  const cx = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
  const cy = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
  // Scale from CSS display size to canvas resolution
  return [cx * canvas.width / r.width, cy * canvas.height / r.height];
}

(function initCorrectionEvents() {
  const canvas = document.getElementById('correct-canvas');
  const RADIUS = 24;

  function onStart(e) {
    e.preventDefault();
    const [px, py] = correctPointerPos(e, canvas);
    _dragIdx = _corners.reduce((best, [cx,cy], i) => {
      const d = Math.hypot(px-cx, py-cy);
      return d < RADIUS && d < (best.d ?? Infinity) ? {i, d} : best;
    }, {}).i ?? -1;
  }
  function onMove(e) {
    if (_dragIdx < 0) return;
    e.preventDefault();
    _corners[_dragIdx] = correctPointerPos(e, canvas);
    drawCorrection();
  }
  function onEnd() { _dragIdx = -1; }

  canvas.addEventListener('mousedown',  onStart);
  canvas.addEventListener('mousemove',  onMove);
  canvas.addEventListener('mouseup',    onEnd);
  canvas.addEventListener('touchstart', onStart, {passive:false});
  canvas.addEventListener('touchmove',  onMove,  {passive:false});
  canvas.addEventListener('touchend',   onEnd);
})();

document.getElementById('correct-apply-btn').addEventListener('click', () => {
  document.getElementById('correct-modal').classList.remove('open');
  // Scale corners back to original image resolution
  const srcCorners = _corners.map(([x,y]) => [x*_correctScale, y*_correctScale]);
  const iw = _correctImg.naturalWidth, ih = _correctImg.naturalHeight;

  // Draw original image to an offscreen canvas to get ImageData
  const offscreen = document.createElement('canvas');
  offscreen.width = iw; offscreen.height = ih;
  offscreen.getContext('2d').drawImage(_correctImg, 0, 0);
  const srcData = offscreen.getContext('2d').getImageData(0, 0, iw, ih);

  const warped = warpPerspective(srcData, iw, ih, srcCorners, 512);
  const warpCanvas = document.createElement('canvas');
  warpCanvas.width = warpCanvas.height = 512;
  warpCanvas.getContext('2d').putImageData(warped, 0, 0);

  // Store warped result for the recognition pipeline, then show photo modal
  window._warpedCanvas  = warpCanvas;
  window._searchCanvas  = warpCanvas;
  showPhotoModal();
});

document.getElementById('correct-skip-btn').addEventListener('click', () => {
  document.getElementById('correct-modal').classList.remove('open');
  window._warpedCanvas = null;
  // Use original image as search canvas
  if (_capturedImg) {
    const c = document.createElement('canvas');
    c.width = _capturedImg.naturalWidth; c.height = _capturedImg.naturalHeight;
    c.getContext('2d').drawImage(_capturedImg, 0, 0);
    window._searchCanvas = c;
  }
  showPhotoModal();
});

let currentPhotoPOI = null;
let currentPhotoBlob = null;
let currentPhotoFname = null;

function takePhoto(poiId = null) {
  currentPhotoPOI = poiId;
  document.getElementById('photo-input').click();
}

let _capturedImg = null;  // full-res HTMLImageElement kept until photo modal closes
let _capturedPOI = null;

document.getElementById('photo-input').addEventListener('change', async e => {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  _capturedPOI    = currentPhotoPOI ? allPOI.find(p => p.id === currentPhotoPOI) : null;
  currentPhotoPOI = null;

  await document.fonts.ready;
  _capturedImg = await new Promise((res, rej) => {
    const url = URL.createObjectURL(file);
    const i = new Image();
    i.onload = () => { URL.revokeObjectURL(url); res(i); };
    i.onerror = rej;
    i.src = url;
  });

  // Show correction modal so user can align corners before annotating
  showCorrectionModal(_capturedImg);
});

async function showPhotoModal() {
  const poi = _capturedPOI;

  const canvas = document.createElement('canvas');
  const ctx    = canvas.getContext('2d');

  if (window._warpedCanvas) {
    // Use the perspective-corrected image
    canvas.width  = window._warpedCanvas.width;
    canvas.height = window._warpedCanvas.height;
    ctx.drawImage(window._warpedCanvas, 0, 0);
    window._warpedCanvas = null;
  } else {
    // Fall back to original photo
    const img = _capturedImg;
    if (!img) return;
    canvas.width  = img.naturalWidth;
    canvas.height = img.naturalHeight;
    ctx.drawImage(img, 0, 0);
  }

  const W = canvas.width, H = canvas.height;
  const barH = Math.round(H * 0.09);
  const pad   = Math.round(W * 0.025);

  ctx.fillStyle = 'rgba(10,10,15,0.78)';
  ctx.fillRect(0, H - barH, W, barH);

  const idSize = Math.round(barH * 0.38);
  ctx.font = `${idSize}px "Press Start 2P", monospace`;
  ctx.fillStyle = '#39ff14';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  ctx.fillText('👾 ' + (poi ? poi.id : '?'), pad, H - barH / 2);

  const dateStr = new Date().toLocaleDateString('en-GB');
  ctx.font = `${Math.round(barH * 0.28)}px "Share Tech Mono", monospace`;
  ctx.fillStyle = '#00f5ff';
  ctx.textAlign = 'right';
  ctx.fillText(dateStr, W - pad, H - barH / 2);

  const dateSlug = new Date().toISOString().slice(0, 10);
  currentPhotoBlob  = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.92));
  currentPhotoFname = poi ? `invader_${poi.id}_${dateSlug}.jpg` : `invader_${dateSlug}.jpg`;

  const previewUrl = URL.createObjectURL(currentPhotoBlob);
  document.getElementById('photo-preview').src = previewUrl;
  document.getElementById('ml-results').textContent = '';
  document.getElementById('photo-ai-btn').disabled = !_mlReady;
  document.getElementById('photo-modal').classList.add('open');
}

document.getElementById('photo-share-btn').addEventListener('click', async () => {
  if (!currentPhotoBlob) return;
  const f = new File([currentPhotoBlob], currentPhotoFname, { type: 'image/jpeg' });
  try {
    await navigator.share({ files: [f], title: currentPhotoFname });
  } catch (err) {
    if (err.name !== 'AbortError') downloadBlob(currentPhotoBlob, currentPhotoFname);
  }
});

document.getElementById('photo-download-btn').addEventListener('click', () => {
  if (currentPhotoBlob) downloadBlob(currentPhotoBlob, currentPhotoFname);
});

document.getElementById('photo-ai-btn').addEventListener('click', async () => {
  const btn = document.getElementById('photo-ai-btn');
  btn.disabled = true;
  await runMLSearch(window._searchCanvas);
  btn.disabled = false;
});

document.getElementById('photo-close-btn').addEventListener('click', () => {
  document.getElementById('photo-modal').classList.remove('open');
  URL.revokeObjectURL(document.getElementById('photo-preview').src);
  document.getElementById('photo-preview').src = '';
  document.getElementById('ml-results').textContent = '';
  window._searchCanvas = null;
  currentPhotoBlob = currentPhotoFname = null;
});

if (!navigator.share) document.getElementById('photo-share-btn').style.display = 'none';

function downloadBlob(blob, fname) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = fname; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

const STATUS_ICON = { ok:'👾', damaged:'⚠️', destroyed:'💀', hidden:'🔵' };

function renderList(visited = getVisited()) {
  const list = document.getElementById('poi-list');

  let visible = filteredPOI;
  if (leafletMap) {
    const bounds = leafletMap.getBounds();
    visible = filteredPOI.filter(p => p.lat && p.lng && bounds.contains([p.lat, p.lng]));
  }

  document.getElementById('list-count').textContent = `(${visible.length})`;

  const shown = visible.slice(0, 250);
  list.innerHTML = shown.map(p => {
    const isV = !!visited[p.id];
    const icon = isV ? '✅' : (STATUS_ICON[p.status] || '👾');
    return `<div class="poi-item${isV?' visited':''}${p.id===selectedId?' selected':''}" onclick="selectPOI('${escId(p.id)}')">
      <div class="poi-icon">${icon}</div>
      <div class="poi-info">
        <div class="poi-id">${p.id}</div>
        <div class="poi-city">${p.city || '–'}</div>
      </div>
      <div class="poi-status s-${p.status}">${p.status}</div>
    </div>`;
  }).join('');

  if (visible.length > 250) {
    list.innerHTML += `<div style="padding:12px;font-size:10px;color:#506070;text-align:center">
      +${(visible.length-250).toLocaleString()} more — zoom in to narrow down</div>`;
  }
}

function escId(id) { return (id+'').replace(/'/g,"\\'"); }

// ─────────────────────────────────────────────────────────────
// GEOLOCATION
// ─────────────────────────────────────────────────────────────
let locMarker = null;
let locAccCircle = null;
let locWatchId = null;
let isTracking = false;

function toggleLocate() {
  if (isTracking) stopLocate(); else startLocate();
}

function startLocate() {
  if (!navigator.geolocation) {
    showToast('⚠ Geolocation not supported');
    return;
  }
  isTracking = true;
  document.getElementById('fab-locate').classList.add('tracking');
  document.getElementById('fab-locate').textContent = '◉';

  locWatchId = navigator.geolocation.watchPosition(
    onLocation,
    onLocationError,
    { enableHighAccuracy: true, maximumAge: 5000 }
  );
}

function stopLocate() {
  isTracking = false;
  if (locWatchId !== null) navigator.geolocation.clearWatch(locWatchId);
  locWatchId = null;
  document.getElementById('fab-locate').classList.remove('tracking');
  document.getElementById('fab-locate').textContent = '◎';
  if (locMarker)    { locMarker.remove();    locMarker = null; }
  if (locAccCircle) { locAccCircle.remove(); locAccCircle = null; }
}

function onLocation(pos) {
  const { latitude: lat, longitude: lng, accuracy } = pos.coords;
  const latlng = [lat, lng];

  if (locAccCircle) {
    locAccCircle.setLatLng(latlng).setRadius(accuracy);
  } else {
    locAccCircle = L.circle(latlng, {
      radius: accuracy,
      color: '#ff00ff', fillColor: '#ff00ff',
      fillOpacity: 0.08, weight: 1, opacity: 0.4,
    }).addTo(leafletMap);
  }

  if (locMarker) {
    locMarker.setLatLng(latlng);
  } else {
    const dotIcon = L.divIcon({
      className: '',
      html: '<div class="loc-dot"></div>',
      iconSize: [16, 16],
      iconAnchor: [8, 8],
    });
    locMarker = L.marker(latlng, { icon: dotIcon, zIndexOffset: 1000 }).addTo(leafletMap);
    leafletMap.setView(latlng, Math.max(leafletMap.getZoom(), 16), { animate: true });
  }
}

function onLocationError(err) {
  const msgs = {
    1: '⚠ Location access denied',
    2: '⚠ Position unavailable',
    3: '⚠ Location request timed out',
  };
  showToast(msgs[err.code] || '⚠ Location error');
  if (err.code === 1) stopLocate();
}

// ─────────────────────────────────────────────────────────────
const CLIP_MEAN = [0.48145466, 0.4578275,  0.40821073];
const CLIP_STD  = [0.26862954, 0.26130258, 0.27577711];

let _ortSession  = null;
let _embMatrix   = null;   // Float32Array [N × 512]
let _embIds      = null;   // string[]
let _mlReady     = false;
let _mlLoadStart = false;

function _mlSetStatus(text, state) {
  const el  = document.getElementById('ml-status');
  const dot = el.querySelector('.ml-dot');
  const btn = document.getElementById('toolbar-photo-btn');

  el.classList.remove('hidden');
  dot.classList.toggle('pulsing', state === 'loading');
  dot.style.background = state === 'ready' ? 'var(--green)' : state === 'error' ? '#444' : 'var(--cyan)';
  el.querySelector('span').textContent = text;
  if (state === 'ready') setTimeout(() => el.classList.add('hidden'), 3000);

  btn.classList.remove('ml-loading', 'ml-ready', 'ml-error');
  if (state !== 'init') btn.classList.add('ml-' + state);
}

async function loadMLAssets() {
  if (_mlLoadStart) return;
  _mlLoadStart = true;
  _mlSetStatus('AI loading…', 'loading');
  try {
    const [part0, part1, embBuf, idsJson] = await Promise.all([
      fetch('model.part0').then(r => r.arrayBuffer()),
      fetch('model.part1').then(r => r.arrayBuffer()),
      fetch('embeddings.bin').then(r => r.arrayBuffer()),
      fetch('ids.json').then(r => r.json()),
    ]);

    const model = new Uint8Array(part0.byteLength + part1.byteLength);
    model.set(new Uint8Array(part0), 0);
    model.set(new Uint8Array(part1), part0.byteLength);
    _ortSession = await ort.InferenceSession.create(model.buffer);
    _embMatrix  = new Float32Array(embBuf);
    _embIds     = idsJson;
    _mlReady    = true;
    _mlSetStatus('AI ready', 'ready');
  } catch(e) {
    console.warn('ML assets not available:', e.message);
    _mlSetStatus('AI unavailable', 'error');
    setTimeout(() => document.getElementById('ml-status').classList.add('hidden'), 4000);
  }
}

function _preprocessCanvas(canvas) {
  const off = document.createElement('canvas');
  off.width = off.height = 224;
  off.getContext('2d').drawImage(canvas, 0, 0, 224, 224);
  const px = off.getContext('2d').getImageData(0, 0, 224, 224).data;
  const t  = new Float32Array(3 * 224 * 224);
  for (let i = 0; i < 224 * 224; i++) {
    t[i]               = (px[i*4]   / 255 - CLIP_MEAN[0]) / CLIP_STD[0];
    t[224*224   + i]   = (px[i*4+1] / 255 - CLIP_MEAN[1]) / CLIP_STD[1];
    t[2*224*224 + i]   = (px[i*4+2] / 255 - CLIP_MEAN[2]) / CLIP_STD[2];
  }
  return t;
}

async function runMLSearch(canvas, top = 5) {
  const el = document.getElementById('ml-results');
  if (!_mlReady) { el.textContent = ''; return; }

  el.textContent = 'identifying…';
  try {
    const tensor  = new ort.Tensor('float32', _preprocessCanvas(canvas), [1, 3, 224, 224]);
    const out     = await _ortSession.run({ pixel_values: tensor });
    const q       = out.image_embeds.data;   // Float32Array [512]
    const N       = _embIds.length;
    const scores  = new Float32Array(N);
    for (let i = 0; i < N; i++) {
      let dot = 0;
      for (let j = 0; j < 512; j++) dot += _embMatrix[i * 512 + j] * q[j];
      scores[i] = dot;
    }
    const idx = Array.from({length: N}, (_, i) => i)
      .sort((a, b) => scores[b] - scores[a])
      .slice(0, top);

    const best = _embIds[idx[0]];
    el.innerHTML =
      `<span class="ml-hit">best match: ${best}</span>` +
      `<div class="ml-list">` +
      idx.map(i =>
        `<span class="ml-item" onclick="selectPOI('${_embIds[i]}')">${_embIds[i]} ${(scores[i]*100).toFixed(0)}%</span>`
      ).join('') +
      `</div>`;
  } catch(e) {
    el.textContent = '';
    console.warn('ML search failed:', e);
  }
}

// Kick off asset loading as soon as the page loads (background, non-blocking)
loadMLAssets();

  document.getElementById('loader-bar').style.width = '100%';
});
